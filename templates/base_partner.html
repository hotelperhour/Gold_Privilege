<!-- templates/partner/base_partner.html -->
{% extends 'base2.html' %}

{% block content %}
<div class="partner-wrapper">
    {% include 'partner_sidebar.html' %}
    
    <main class="partner-content-wrapper">
        {% block partner_content %}{% endblock %}
    </main>
</div>

<script>
    // Auto-hide alerts for partner pages
    document.addEventListener('DOMContentLoaded', function() {
        // Auto-hide alerts after 5 seconds
        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(alert => {
            setTimeout(() => {
                const bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            }, 5000);
        });
        
        // Mobile sidebar active state management
        const currentPath = window.location.pathname;
        const mobileNavItems = document.querySelectorAll('.mobile-nav-item');
        
        mobileNavItems.forEach(item => {
            const href = item.getAttribute('href');
            if (currentPath.includes(href.split('/').filter(Boolean).pop())) {
                item.classList.add('active');
            }
        });
    });
</script>
{% endblock %}
