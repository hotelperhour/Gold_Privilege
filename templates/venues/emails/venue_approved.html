<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Venue Created - Gold Privilege</title>
    <style>
        /* Same styles as before */
        body { font-family: Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .header { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); color: #d4af37; padding: 40px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 32px; }
        .content { padding: 40px 30px; color: #333; }
        .button { display: inline-block; background: linear-gradient(135deg, #d4af37 0%, #f4c430 100%); color: #000; text-decoration: none; padding: 18px 45px; border-radius: 10px; font-weight: bold; font-size: 18px; margin: 25px 0; }
        .info-box { background: #f0f8ff; border-left: 5px solid #d4af37; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .footer { background: #1a1a1a; color: #fff; padding: 30px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Similar structure -->
<div class="header" style="background: linear-gradient(135deg, #1a4314 0%, #2d5a27 100%);">
    <h1>✅ Venue Approved!</h1>
</div>
<div class="content">
    <h2>Congratulations {{ partner.user.get_full_name }}!</h2>
    <p>Your venue <strong>{{ venue.name }}</strong> has been approved and is now live!</p>
    <p>Members can discover and visit starting today.</p>
    <div style="text-align: center;">
        <a href="{{ protocol }}://{{ domain }}{% url 'venues:detail' venue.slug %}" class="button">
            View Live Venue Page
        </a>
    </div>
</div>
        <div class="footer">
            <p><strong>Gold Privilege Partner Team</strong></p>
            <p>© 2025 Gold Privilege. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
