{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Complete - Gold Privilege</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FFFFFF;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Gold Navbar */
        .custom-navbar {
            background-color: #E5AD04;
            height: 70px;
            width: 100%;
        }

        /* Center Wrapper */
        .reset-wrapper {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Card */
        .reset-card {
            width: 100%;
            max-width: 480px;
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px 32px;
            text-align: center;
        }

        .icon-success {
            font-size: 70px;
            color: #28a745;
            margin-bottom: 15px;
        }

        .reset-card h1 {
            font-size: 26px;
            font-weight: 600;
            color: #3F3D56;
            margin-bottom: 10px;
        }

        .reset-card p {
            font-size: 14px;
            color: #6B6B6B;
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        /* Button */
        .reset-btn {
            width: 100%;
            max-width: 360px;
            height: 45px;
            background: #E5AD04;
            border: none;
            border-radius: 5px;
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .reset-btn i {
            margin-right: 8px;
        }

        .reset-btn:hover {
            background: #cd9b06;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(229, 173, 4, 0.3);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .reset-card {
                padding: 30px 20px;
            }

            .reset-card h1 {
                font-size: 22px;
            }

            .reset-card p {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- Gold Navbar -->
    <div class="custom-navbar"></div>

    <!-- Content -->
    <div class="reset-wrapper">
        <div class="reset-card">

            <div class="icon-success">
                <i class="fas fa-check-circle"></i>
            </div>

            <h1>Password Reset Successful</h1>

            <p>
                Your password has been reset successfully.
                You can now log in to your Gold Privilege account using your new password.
            </p>

            <a href="{% url 'account:login' %}" class="reset-btn">
                <i class="fas fa-sign-in-alt"></i> Login Now
            </a>

        </div>
    </div>

</body>
</html>
