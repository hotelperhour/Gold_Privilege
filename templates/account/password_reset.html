{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Gold Privilege</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FFFFFF;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Gold Navbar */
        .custom-navbar {
            background-color: #E5AD04;
            height: 70px;
            width: 100%;
        }

        /* Center Wrapper - FIXED: No scrolling needed */
        .reset-wrapper {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;  /* Changed from flex-start */
            justify-content: center;
            padding: 20px;  /* Reduced padding */
        }

        /* Main Card - FIXED: Reduced height */
        .reset-card {
            width: 100%;
            max-width: 480px;  /* Reduced from 560px */
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 32px;  /* Adjusted padding */
        }

        .reset-card h1 {
            font-size: 26px;
            font-weight: 600;
            color: #3F3D56;
            margin-bottom: 8px;  /* Reduced margin */
        }

        .reset-card p {
            font-size: 14px;
            color: #6B6B6B;
            max-width: 100%;
            line-height: 1.6;
            margin-bottom: 20px;  /* Consistent margin */
            padding: 0 10px;
        }

        /* Image - FIXED: Smaller size */
        .reset-image {
            width: 160px;  /* Reduced from 220px */
            margin: 15px 0;  /* Reduced margin */
        }

        /* Form - FIXED: Matching login/register */
        .form-group {
            width: 100%;
            max-width: 360px;  /* Same as login/register */
            text-align: left;
            margin-bottom: 20px;  /* Same margin as register */
        }

        .form-group label {
            display: block;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;  /* Same as register */
            font-weight: 500;  /* Same as register */
            color: #3F3D56;  /* FIXED: Same color as register */
            margin-bottom: 8px;  /* Same as register */
            opacity: 0.75;  /* Same as register */
        }

        .form-group input {
            width: 100%;  /* FIXED: Full width like register */
            height: 45px;  /* FIXED: Same as register (was 44px) */
            padding: 0 15px;  /* Same as register */
            border: 2px solid #E5E5E5;  /* FIXED: Same color as register */
            border-radius: 5px;  /* Same as register */
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            color: #3F3D56;  /* Same text color */
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #E5AD04;
        }

        /* Error message */
        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        /* Button - FIXED: Same width as input field */
        .reset-btn {
            width: 100%;
            max-width: 360px;  /* FIXED: Same as form field */
            height: 45px;  /* FIXED: Same as register button */
            background: #E5AD04;
            border: none;
            border-radius: 5px;  /* Same as register */
            color: #FFFFFF;
            font-size: 15px;  /* Same as register */
            font-weight: 600;  /* Same as register */
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;  /* Same as register */
        }

        .reset-btn:hover {
            background: #cd9b06;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(229, 173, 4, 0.3);
        }

        .back-login {
            margin-top: 0;  /* FIXED: No extra margin */
            font-size: 14px;  /* Same as register signin-link */
            text-align: center;
        }

        .back-login .text {
            color: #3F3D56;
        }

        .back-login a {
            color: #E5AD04;
            font-weight: 600;
            text-decoration: none;
            margin-left: 5px;
        }

        .back-login a:hover {
            text-decoration: underline;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .reset-wrapper {
                padding: 15px;
            }

            .reset-card {
                padding: 30px 20px;
            }

            .reset-image {
                width: 140px;
            }

            .reset-card h1 {
                font-size: 22px;
            }

            .reset-card p {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .reset-card {
                padding: 25px 15px;
            }

            .reset-image {
                width: 120px;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>

    <!-- Gold Navbar -->
    <div class="custom-navbar"></div>

    <!-- Content -->
    <div class="reset-wrapper">
        <div class="reset-card">

            <h1>Forgot Password</h1>

            <!-- Image -->
            <img src="{% static 'images/forget_password.svg' %}" 
                 alt="Forgot Password" 
                 class="reset-image">

            <!-- Text - FIXED: Same margin as form fields -->
            <p>
                Enter your email address below and we'll send you a link to reset your password.
            </p>

            <!-- Form -->
            <form method="post" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                {% csrf_token %}

                <div class="form-group">
                    <label>Email Address</label>
                    {{ form.email }}
                    {% if form.email.errors %}
                        <span class="error-message">
                            {{ form.email.errors|join:", " }}
                        </span>
                    {% endif %}
                </div>

                <button type="submit" class="reset-btn">
                    Send Reset Link
                </button>

                <div class="back-login">
                    <span class="text">Remember your password?</span>
                    <a href="{% url 'account:login' %}">Go to Login</a>
                </div>
            </form>

        </div>
    </div>

</body>
</html>
